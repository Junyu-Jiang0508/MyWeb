<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="generator" content="Jekyll v{{ jekyll.version }}" />
    {% seo %}
    <link href="{{ '/assets/images/icon.png' | relative_url }}" rel="icon" type="image/png">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" href="{{ '/atom.xml' | relative_url }}" title="{{ site.title | escape }}">
    <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | relative_url }}">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZJB8RH97S"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-KZJB8RH97S');
    </script>
    <script defer src="{{ '/assets/js/analytics.js' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/copyCode.js' | relative_url }}"></script>
    {% if page.math == true %}
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    {% endif %}
</head>
<body>
    <div class="wrapper">
        {% include header.html %}
        
        <main class="content">
            {{ content }}
        </main>
        
        {% include footer.html %}
    </div>
</body>
</html>
